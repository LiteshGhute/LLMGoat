services:
  llmgoat:
    build: .
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - gpt4all_models:/root/.local/share/nomic.ai/GPT4All
      - embeddings_cache:/app/embeddings

volumes:
  gpt4all_models:
  embeddings_cache:
